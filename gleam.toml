name = "tern"
version = "0.1.0"
description = "Embeddable, temporal data-lineage on the BEAM, backed by Apache AGE."
licences = ["MIT"]
repository = { type = "github", user = "cargopete", repo = "tern" }

#
# For a full reference of all the available options, you can have a look at
# https://gleam.run/writing-gleam/gleam-toml/.

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
pog = ">= 4.1.0 and < 5.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
gleam_time = ">= 1.8.0 and < 2.0.0"
youid = ">= 1.6.0 and < 2.0.0"
envoy = ">= 1.2.0 and < 2.0.0"
wisp = ">= 2.2.2 and < 3.0.0"
mist = ">= 6.0.3 and < 7.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
wren = { git = "https://github.com/cargopete/wren.git", ref = "main" }

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
